<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Purchase Order - IMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="app-container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/header :: header('Edit Purchase Order')}"></div>
        <div class="content-area">
            <div class="page-header">
                <h2><i class="fas fa-edit"></i> Edit Purchase Order #<span th:text="${order.id}"></span></h2>
                <a th:href="@{/purchase-orders}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
            <div class="card">
                <div class="card-body form-container">
                    <form th:action="@{/purchase-orders/update}" method="post">
                        <input type="hidden" name="id" th:value="${order.id}">

                        <div class="form-row">
                            <div class="form-group">
                                <label for="supplierId">Supplier *</label>
                                <select id="supplierId" name="supplierId" class="form-control" required>
                                    <option value="">Select Supplier</option>
                                    <option th:each="s : ${suppliers}"
                                            th:value="${s.id}"
                                            th:text="${s.name}"
                                            th:selected="${order.supplier.id == s.id}">
                                    </option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="productId">Product *</label>
                                <select id="productId" name="productId" class="form-control" required>
                                    <option value="">Select Product</option>
                                    <option th:each="p : ${products}"
                                            th:value="${p.id}"
                                            th:text="${p.name + ' (₹' + p.price + ')'}"
                                            th:selected="${order.product.id == p.id}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="quantity">Quantity *</label>
                                <input type="number" id="quantity" name="quantity" min="1"
                                       class="form-control" required
                                       th:value="${order.quantity}">
                            </div>
                            <div class="form-group">
                                <label for="totalPrice">Total Price (₹) *</label>
                                <input type="number" id="totalPrice" name="totalPrice" step="0.01"
                                       class="form-control" required readonly
                                       style="background-color: #f5f5f5;"
                                       th:value="${order.totalPrice}">
                                <span class="form-text">Calculated automatically</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="status">Status *</label>
                            <select id="status" name="status" class="form-control" required>
                                <option value="PENDING" th:selected="${order.status == 'PENDING'}">Pending</option>
                                <option value="RECEIVED" th:selected="${order.status == 'RECEIVED'}">Received</option>
                                <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">Cancelled</option>
                            </select>
                            <span class="form-text">
                                    <i class="fas fa-info-circle"></i>
                                    Changing to "Received" will add stock. Changing from "Received" will remove stock.
                                </span>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Update Order
                            </button>
                            <a th:href="@{/purchase-orders}" class="btn btn-outline">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
    // Auto-calculate total price for purchase orders
    const productSelect = document.getElementById('productId');
    const quantityInput = document.getElementById('quantity');
    const totalPriceInput = document.getElementById('totalPrice');

    // Store product prices
    const productPrices = {};

    // Parse product prices from options
    document.querySelectorAll('#productId option').forEach(option => {
        if (option.value) {
            const text = option.textContent;
            const priceMatch = text.match(/₹([\d.]+)/);
            if (priceMatch) {
                productPrices[option.value] = parseFloat(priceMatch[1]);
            }
        }
    });

    function calculateTotal() {
        const productId = productSelect.value;
        const quantity = parseFloat(quantityInput.value) || 0;

        if (productId && productPrices[productId] && quantity > 0) {
            const total = productPrices[productId] * quantity;
            totalPriceInput.value = total.toFixed(2);
        }
    }

    // Add event listeners
    productSelect.addEventListener('change', calculateTotal);
    quantityInput.addEventListener('input', calculateTotal);
</script>
</body>

</html>
