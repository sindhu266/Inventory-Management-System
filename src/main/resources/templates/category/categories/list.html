<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - IMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="app-container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/header :: header('Categories')}"></div>
        <div class="content-area">

            <div th:if="${successMessage}" class="alert alert-success">
                <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
                <button class="close-alert">&times;</button>
            </div>

            <div class="page-header">
                <h2><i class="fas fa-tags"></i> All Categories</h2>
                <a sec:authorize="hasAnyRole('ADMIN', 'MANAGER')" th:href="@{/categories/new}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add Category
                </a>
            </div>

            <div class="card">
                <div class="card-body table-container">
                    <table th:if="${!categories.isEmpty()}">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${categories}">
                            <td th:text="${c.id}"></td>
                            <td th:text="${c.name}"></td>
                            <td th:text="${c.description ?: '—'}"></td>
                            <td class="actions">
                                <a sec:authorize="hasAnyRole('ADMIN', 'MANAGER')"
                                   th:href="@{/categories/edit/{id}(id=${c.id})}"
                                   class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                <form sec:authorize="hasAnyRole('ADMIN', 'MANAGER')"
                                      th:action="@{/categories/delete/{id}(id=${c.id})}" method="post"
                                      style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-danger btn-delete"><i
                                            class="fas fa-trash"></i></button>
                                </form>
                                <span sec:authorize="hasRole('STAFF')" class="text-muted">—</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <div th:if="${categories.isEmpty()}" class="empty-state">
                        <i class="fas fa-tags"></i>
                        <p>No categories found. Create your first category!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>

</html>
