<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - IMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="app-container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/header :: header('Reports')}"></div>
        <div class="content-area">
            <div class="page-header">
                <h2><i class="fas fa-chart-bar"></i> Export Reports</h2>
            </div>
            <div class="stats-grid">
                <div class="stat-card success">
                    <div class="stat-icon success"><i class="fas fa-file-csv"></i></div>
                    <div class="stat-info">
                        <h3>Products</h3>
                        <p>Export all products data</p>
                    </div>
                    <a th:href="@{/reports/products/csv}" class="btn btn-success btn-sm" style="margin-left:auto">
                        <i class="fas fa-download"></i> Download CSV
                    </a>
                </div>
                <div class="stat-card info">
                    <div class="stat-icon info"><i class="fas fa-file-csv"></i></div>
                    <div class="stat-info">
                        <h3>Stock Logs</h3>
                        <p>Export stock movement history</p>
                    </div>
                    <a th:href="@{/reports/stock-logs/csv}" class="btn btn-primary btn-sm" style="margin-left:auto">
                        <i class="fas fa-download"></i> Download CSV
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>

</html>
