<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Logs - IMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="app-container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/header :: header('Stock Logs')}"></div>
        <div class="content-area">
            <div class="page-header">
                <h2><i class="fas fa-clipboard-list"></i> Stock Movement Logs</h2>
            </div>
            <div class="card">
                <div class="card-body table-container">
                    <table th:if="${!logs.isEmpty()}">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Product ID</th>
                            <th>Change Type</th>
                            <th>Quantity Changed</th>
                            <th>Performed By</th>
                            <th>Date &amp; Time</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="log : ${logs}">
                            <td th:text="${log.id}"></td>
                            <td th:text="${log.productId}"></td>
                            <td>
                                        <span th:if="${log.changeType.name() == 'ADD'}" class="badge badge-success"><i
                                                class="fas fa-arrow-up"></i> ADD</span>
                                <span th:if="${log.changeType.name() == 'REMOVE'}" class="badge badge-danger"><i
                                        class="fas fa-arrow-down"></i> REMOVE</span>
                            </td>
                            <td th:text="${log.quantityChanged}"></td>
                            <td th:text="${log.performedBy != null ? log.performedBy : 'System'}"></td>
                            <td th:text="${#temporals.format(log.changeDate, 'yyyy-MM-dd HH:mm:ss')}"></td>
                        </tr>
                        </tbody>
                    </table>
                    <div th:if="${logs.isEmpty()}" class="empty-state">
                        <i class="fas fa-clipboard-list"></i>
                        <p>No stock movements recorded yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>

</html>
