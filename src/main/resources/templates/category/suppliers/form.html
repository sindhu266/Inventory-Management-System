<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${supplier.id != null ? 'Edit Supplier' : 'Add Supplier'} + ' - IMS'">Supplier Form - IMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="app-container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/header :: header(${supplier.id != null ? 'Edit Supplier' : 'Add Supplier'})}">
        </div>
        <div class="content-area">
            <div class="page-header">
                <h2><i class="fas fa-truck"></i> <span
                        th:text="${supplier.id != null ? 'Edit Supplier' : 'New Supplier'}"></span></h2>
                <a th:href="@{/suppliers}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
            <div class="card">
                <div class="card-body form-container">
                    <form th:action="@{/suppliers/save}" th:object="${supplier}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="form-group">
                            <label for="name">Supplier Name *</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control" required
                                   placeholder="Company name">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="contactPerson">Contact Person *</label>
                                <input type="text" id="contactPerson" th:field="*{contactPerson}"
                                       class="form-control" required placeholder="Full name">
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone *</label>
                                <input type="tel" id="phone" th:field="*{phone}" class="form-control" required
                                       placeholder="+91 XXXXX XXXXX">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" th:field="*{email}" class="form-control"
                                       placeholder="email@example.com">
                            </div>
                            <div class="form-group">
                                <label for="address">Address</label>
                                <input type="text" id="address" th:field="*{address}" class="form-control"
                                       placeholder="Business address">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> <span
                                    th:text="${supplier.id != null ? 'Update' : 'Save'}"></span></button>
                            <a th:href="@{/suppliers}" class="btn btn-outline">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>

</html>
