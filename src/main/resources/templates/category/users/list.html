<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - IMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="app-container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/header :: header('User Management')}"></div>
        <div class="content-area">
            <div th:if="${successMessage}" class="alert alert-success">
                <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
                <button class="close-alert">&times;</button>
            </div>
            <div class="page-header">
                <h2><i class="fas fa-users-cog"></i> All Users</h2>
                <a th:href="@{/admin/users/new}" class="btn btn-primary"><i class="fas fa-plus"></i> Add User</a>
            </div>
            <div class="card">
                <div class="card-body table-container">
                    <table th:if="${!users.isEmpty()}">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}"></td>
                            <td th:text="${u.username}"></td>
                            <td>
                                        <span th:if="${u.role.name() == 'ROLE_ADMIN'}"
                                              class="badge badge-danger">Admin</span>
                                <span th:if="${u.role.name() == 'ROLE_MANAGER'}"
                                      class="badge badge-warning">Manager</span>
                                <span th:if="${u.role.name() == 'ROLE_STAFF'}"
                                      class="badge badge-info">Staff</span>
                            </td>
                            <td class="actions">
                                <form th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post"
                                      style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-danger btn-delete"><i
                                            class="fas fa-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <div th:if="${users.isEmpty()}" class="empty-state">
                        <i class="fas fa-users-cog"></i>
                        <p>No users found.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>

</html>
