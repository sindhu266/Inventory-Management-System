<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User - IMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="app-container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/header :: header('Add User')}"></div>
        <div class="content-area">
            <div class="page-header">
                <h2><i class="fas fa-user-plus"></i> New User</h2>
                <a th:href="@{/admin/users}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
            <div class="card">
                <div class="card-body form-container">
                    <form th:action="@{/admin/users/save}" method="post">
                        <div class="form-group">
                            <label for="username">Username *</label>
                            <input type="text" id="username" name="username" class="form-control" required
                                   minlength="4" maxlength="20" placeholder="4-20 characters">
                        </div>
                        <div class="form-group">
                            <label for="password">Password *</label>
                            <input type="password" id="password" name="password" class="form-control" required
                                   minlength="6" placeholder="Min 6 characters">
                        </div>
                        <div class="form-group">
                            <label for="role">Role *</label>
                            <select id="role" name="role" class="form-control" required>
                                <option value="">Select Role</option>
                                <option th:each="r : ${roles}" th:value="${r.name()}"
                                        th:text="${r.name().replace('ROLE_', '')}"></option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Create
                                User</button>
                            <a th:href="@{/admin/users}" class="btn btn-outline">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>

</html>
