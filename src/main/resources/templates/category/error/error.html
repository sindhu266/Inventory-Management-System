<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="error-page">
    <div class="error-content">
        <i class="fas fa-exclamation-circle"></i>
        <h1 th:text="${status ?: 'Error'}">Error</h1>
        <h2 th:text="${error ?: 'Something went wrong'}">Error</h2>
        <p th:text="${message ?: 'An unexpected error occurred. Please try again.'}"></p>
        <a th:href="@{/dashboard}" class="btn btn-primary"><i class="fas fa-home"></i> Back to Dashboard</a>
    </div>
</div>
</body>

</html>
